spring:
  application:
    name: earthquake-monitoring
  cloud:
    config:
      enabled: false        # standalone monolith needs no config server (mirrors eureka.client.enabled)
  datasource:
    url: jdbc:postgresql://localhost:5432/earthquake
    username: 
    password: 
  jpa:
    hibernate:
      ddl-auto: validate     # Flyway owns the schema now; Hibernate only validates the mapping
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true   # tolerate a pre-existing DB created earlier by ddl-auto
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      auto-offset-reset: earliest      # new consumer groups read from the beginning
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.afet.monitoring.domain.event
        spring.json.value.default.type: com.afet.monitoring.domain.event.EarthquakeDetectedEvent
server:
  port: 8081

# --- Security (JWT) ---
# In production, supply a strong secret via the JWT_SECRET env var. The default below is
# for local development only. Demo logins: admin/admin123, scientist/science123, viewer/viewer123.
app:
  # CORS: origins allowed to call the API from a browser (the SPA frontend). Override with
  # the APP_CORS_ALLOWED_ORIGINS env (comma-separated) in any deployment.
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  security:
    jwt:
      secret: ${JWT_SECRET:dev-only-change-me-please-32-chars-min-secret}
      ttl-minutes: 120

# --- Actuator (operational endpoints) ---
# /actuator/health and /actuator/info are public (see SecurityConfig); the rest require auth.
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

# Swagger UI -> http://localhost:8081/swagger-ui.html   (raw spec: /v3/api-docs)
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method      # group GET/POST/DELETE sensibly
    tags-sorter: alpha
    display-request-duration: true
  api-docs:
    path: /v3/api-docs

# --- Service discovery (Spring Cloud) ---
# Eureka is OFF by default so the standalone monolith needs no registry. The `platform`
# profile below turns it on (and pulls central config) — that profile is what the
# detection-service container runs (SPRING_PROFILES_ACTIVE=platform in docker-compose).
eureka:
  client:
    enabled: false

---
spring:
  cloud:
    config:
      enabled: true
  config:
    activate:
      on-profile: platform
    # `optional:` means a missing/unreachable config server won't stop startup.
    import: optional:configserver:${CONFIG_SERVER_URL:http://config-server:8888}
eureka:
  client:
    enabled: true
    service-url:
      defaultZone: ${EUREKA_URL:http://discovery:8761/eureka}
  instance:
    prefer-ip-address: true
