name: CI

on:
  push:
    branches: [ main, "phase/**" ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    name: Build & test (JDK 21)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      # Unit tests run on every push; integration tests (Testcontainers) need Docker,
      # which the ubuntu-latest runner provides. `verify` runs both via Surefire + Failsafe.
      - name: Build and run all tests
        run: mvn -B -ntp verify

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            target/surefire-reports/**
            target/failsafe-reports/**
          if-no-files-found: ignore

  docker-build:
    name: Docker image builds
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - name: Build the application image
        run: docker build -t earthquake-monitoring:ci .
