spring:
  application:
    name: alert-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        # Ignore the producer's __TypeId__ header and map the JSON onto our shared event.
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.afet.platform.events.EarthquakeDetectedEvent
        spring.json.trusted.packages: com.afet.platform.events
server:
  port: 8091
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
management:
  endpoints:
    web:
      exposure:
        include: health, info
