name: CI (platform)

on:
  push:
    branches: [ main, "phase/**" ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build all modules (JDK 21)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build the reactor
        run: mvn -B -ntp -DskipTests package
